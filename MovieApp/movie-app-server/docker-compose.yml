services:
  postgres:
    image: postgres:16-alpine
    container_name: movie-app-postgres
    environment:
      POSTGRES_USER: movieapp
      POSTGRES_PASSWORD: movieapp123
      POSTGRES_DB: movieappdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movieapp -d movieappdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: movie-app-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: movieapp
      DB_PASSWORD: movieapp123
      DB_NAME: movieappdb
      PORT: 3009
    ports:
      - "3009:3009"
    restart: on-failure

volumes:
  postgres_data:
